<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- HAPUS ZOOM: User tidak bisa zoom in/out agar feel aplikasi native tetap terjaga -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FFKIPAS.ID ACCESS V2</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --ios-blue: #0A84FF;
            --ios-green: #30D158;
            --ios-red: #FF453A;
            --ios-dark: #000000;
            --ios-card: rgba(28, 28, 30, 0.6);
            --blur: blur(30px);
        }

        * {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: #000;
            background-image: radial-gradient(circle at 50% -20%, #1c1c1e, #000);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* TOAST DYNAMIC ISLAND */
        #toast-container {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 9999;
            pointer-events: none;
        }

        .ios-toast {
            background: rgba(28, 28, 30, 0.9);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            padding: 10px 22px;
            border-radius: 30px;
            border: 0.5px solid rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(-200%);
            transition: transform 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .ios-toast.show { transform: translateY(0); }

        /* CARD BOX */
        .glass-card {
            background: var(--ios-card);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 85%;
            max-width: 350px;
            padding: 45px 25px;
            border-radius: 50px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            animation: slideUp 0.8s ease-out;
        }

        .avatar-container {
            position: relative;
            width: 90px;
            height: 90px;
            margin: 0 auto 25px;
        }

        .avatar-box {
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #1c1c1e, #000);
            border-radius: 25px; /* iOS Squircle */
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 35px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .status-dot {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 18px;
            height: 18px;
            background: var(--ios-green);
            border-radius: 50%;
            border: 3px solid #000;
            transition: 0.5s;
        }

        h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
        p.subtitle { color: #8E8E93; font-size: 14px; margin-bottom: 40px; }

        .btn-stack { display: flex; flex-direction: column; gap: 14px; }

        .ios-btn {
            background: rgba(255, 255, 255, 0.07);
            border: none;
            padding: 18px;
            border-radius: 22px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .ios-btn:active { transform: scale(0.94); background: rgba(255,255,255,0.12); }

        .btn-blue { background: var(--ios-blue); border: none; box-shadow: 0 8px 20px rgba(10, 132, 255, 0.3); }

        .btn-icon { width: 20px; height: 20px; fill: currentColor; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .hidden { display: none; }
        #maintenance-mode { color: var(--ios-red); animation: pulse 2s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="toast-container">
        <div id="ios-toast" class="ios-toast">
            <span id="toast-icon"></span>
            <span id="toast-text" style="font-size: 14px; font-weight: 500;"></span>
        </div>
    </div>

    <div class="glass-card">
        <div class="avatar-container">
            <div class="avatar-box">💎</div>
            <div id="dot" class="status-dot"></div>
        </div>
        
        <h1 id="user-title">Premium Server</h1>
        <p class="subtitle">Verifikasi enkripsi terdeteksi</p>

        <div id="main-ui" class="btn-stack">
            <!-- TOMBOL DOWNLOAD + ICON -->
            <a id="btn-a" href="#" class="ios-btn btn-blue">
                <svg class="btn-icon" viewBox="0 0 24 24"><path d="M12 2C6.49 2 2 6.49 2 12s4.49 10 10 10 10-4.49 10-10S17.51 2 12 2zm-1 12H8l4 4 4-4h-3V7h-2v7z"/></svg>
                DOWNLOAD
            </a>
            
            <!-- TOMBOL VERIFIKASI ID + ICON -->
            <a id="btn-b" href="#" class="ios-btn">
                <svg class="btn-icon" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
                VERIFIKASI ID
            </a>
        </div>

        <div id="maintenance-mode" class="hidden">
            <p id="pause-msg" style="font-weight: bold;"></p>
            <p style="font-size: 12px; color: #8E8E93;">Silahkan hubungi admin untuk info lebih lanjut.</p>
        </div>
    </div>

<script>
    // Inisialisasi Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCzwbkvUPdSpc_b4bfQBDsfawJ4mJrzY9E",
        databaseURL: "https://remot-control-5e6a9-default-rtdb.firebaseio.com",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function triggerToast(msg, isSuccess) {
        const toast = document.getElementById('ios-toast');
        document.getElementById('toast-text').innerText = msg;
        document.getElementById('toast-icon').innerText = isSuccess ? '✅' : '🚨';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Monitor Data Secara Real-time
    db.ref('remote_config').on('value', (snapshot) => {
        const val = snapshot.val();
        if (val) {
            const mainUI = document.getElementById('main-ui');
            const maintUI = document.getElementById('maintenance-mode');
            const dot = document.getElementById('dot');

            if (val.isPaused) {
                mainUI.classList.add('hidden');
                maintUI.classList.remove('hidden');
                document.getElementById('pause-msg').innerText = "⚠️ " + val.pauseMessage;
                dot.style.background = 'var(--ios-red)';
                triggerToast("Sistem Dijeda", false);
            } else {
                mainUI.classList.remove('hidden');
                maintUI.classList.add('hidden');
                document.getElementById('btn-a').href = val.urlA;
                document.getElementById('btn-b').href = val.urlB;
                dot.style.background = 'var(--ios-green)';
                triggerToast("Sistem Aktif & Terenkripsi", true);
            }
        }
    });

    // Landing Notification
    setTimeout(() => { if(!document.getElementById('main-ui').classList.contains('hidden')) triggerToast("Koneksi Stabil", true); }, 1500);
</script>

</body>
</html>
